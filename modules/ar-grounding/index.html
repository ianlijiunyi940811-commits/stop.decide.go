<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STOP 3 — 接地練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --border:rgba(255,255,255,0.1);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --teal:#3fb950;--teal-dim:rgba(63,185,80,0.18);
  --purple:#a371f7;--purple-dim:rgba(163,113,247,0.18);
  --amber:#e6a817;--amber-dim:rgba(230,168,23,0.18);
  --red:#f85149;
  --btn-h:60px;--btn-r:14px;
}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Noto Sans TC',sans-serif;color:var(--text)}

/* ── FULLSCREEN CAMERA LAYER ── */
#camLayer{
  position:fixed;inset:0;z-index:0;
  background:#000;display:flex;align-items:center;justify-content:center;
}
#camVideo{width:100%;height:100%;object-fit:cover;display:block}

/* ── SCREENS over camera ── */
.screen{
  position:fixed;inset:0;z-index:10;
  display:none;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
}
.screen.active{display:flex}

/* ── GLASS CARD ── */
.glass{
  background:rgba(13,17,23,0.82);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
}

/* ── TOP HUD ── */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:env(safe-area-inset-top,16px) 16px 12px;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7) 0%,transparent 100%);
}
.hud-badge{
  font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;
  background:var(--purple-dim);border:1px solid rgba(163,113,247,0.4);color:var(--purple);
}
.hud-badge.teal{background:var(--teal-dim);border-color:rgba(63,185,80,0.4);color:var(--teal)}
.hud-badge.amber{background:var(--amber-dim);border-color:rgba(230,168,23,0.4);color:var(--amber)}
.hud-title{flex:1;font-size:14px;font-weight:500;color:#fff}
.pip-row{display:flex;gap:5px}
.pip{width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,0.2)}
.pip.done{background:var(--teal)}.pip.active{background:var(--purple)}

/* ── BOTTOM DRAWER (Step 1) ── */
.drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  transition:transform .35s cubic-bezier(.32,.72,0,1);
}
.drawer-handle-area{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 16px 6px;
  background:linear-gradient(to top,rgba(0,0,0,0.0) 0%,transparent 100%);
  cursor:pointer;
}
.drawer-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.4);margin-bottom:8px}
.drawer-peek{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px 8px;
}
.drawer-progress-text{font-size:15px;font-weight:600;color:#fff}
.drawer-chevron{font-size:18px;color:rgba(255,255,255,0.6);transition:transform .3s}
.drawer.open .drawer-chevron{transform:rotate(180deg)}

.drawer-body{
  background:rgba(10,12,16,0.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.12);
  padding:0 12px calc(env(safe-area-inset-bottom,16px) + 12px);
  max-height:55vh;overflow-y:auto;
}
/* collapsed: only show buttons, no list */
.drawer:not(.open) .drawer-body{display:none}
.drawer:not(.open) .drawer-handle-area{
  background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);
  padding-bottom:0;
}

/* Progress dots row */
.prog-dots{
  display:flex;gap:8px;padding:12px 4px 4px;
}
.prog-dot{
  flex:1;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.45);
  cursor:pointer;transition:all .2s;user-select:none;
}
.prog-dot:active{transform:scale(0.95)}
.prog-dot.found{background:rgba(63,185,80,0.2);border-color:rgba(63,185,80,0.6);color:var(--teal)}
.prog-dot-check{font-size:16px}

.drawer-items{display:flex;flex-direction:column;gap:4px;padding:4px 0 8px}
.item-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 12px;border-radius:14px;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.item-row:active{background:rgba(255,255,255,0.06)}
.item-row.found{background:rgba(63,185,80,0.12)}
.item-circle{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:transparent;
  transition:all .2s;
}
.item-row.found .item-circle{background:var(--teal);border-color:var(--teal);color:#000}
.item-label{font-size:16px;font-weight:500;color:#fff;flex:1}
.item-tag{font-size:12px;color:var(--teal);font-weight:600}

/* snap / next buttons inside drawer */
.drawer-btns{padding:8px 0 4px;display:flex;flex-direction:column;gap:8px}

/* ── BIG BUTTONS ── */
.btn{
  width:100%;height:var(--btn-h);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Noto Sans TC',sans-serif;font-size:17px;font-weight:700;
  border-radius:var(--btn-r);border:none;cursor:pointer;
  transition:transform .12s,opacity .15s;
  letter-spacing:.02em;
}
.btn:active{transform:scale(0.96)}
.btn + .btn{margin-top:10px}

/* Button variants — always high contrast */
.btn-primary{background:#7c3aed;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.45)}
.btn-success{background:#16a34a;color:#fff;box-shadow:0 4px 20px rgba(22,163,74,0.45)}
.btn-white{background:#fff;color:#111;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.btn-outline{background:rgba(255,255,255,0.12);color:#fff;border:2px solid rgba(255,255,255,0.5);backdrop-filter:blur(8px)}
.btn-amber{background:#d97706;color:#fff;box-shadow:0 4px 20px rgba(217,119,6,0.45)}
.btn:disabled{opacity:.35;pointer-events:none}

/* ── STATUS BAR ── */
.status-bar{
  margin-bottom:12px;
  padding:10px 16px;border-radius:12px;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);
  font-size:14px;color:#fff;text-align:center;
  backdrop-filter:blur(8px);
}

/* ── ITEMS LIST (floating card) ── */
.items-card{
  margin-bottom:12px;padding:6px;
  border-radius:18px;
  background:rgba(13,17,23,0.88);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
}
.item-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border-radius:13px;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.item-row:active{background:rgba(255,255,255,0.06)}
.item-row.found{background:rgba(63,185,80,0.15)}
.item-circle{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:transparent;
  transition:all .2s;
}
.item-row.found .item-circle{background:var(--teal);border-color:var(--teal);color:#000}
.item-label{font-size:16px;font-weight:500;color:#fff;flex:1}
.item-tag{font-size:12px;color:var(--teal);font-weight:500}

/* flip btn */
.flip-btn{
  position:fixed;top:calc(env(safe-area-inset-top,16px) + 60px);right:16px;z-index:25;
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.4);
  display:none;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(8px);transition:transform .1s,background .15s;
}
.flip-btn:active{background:rgba(255,255,255,0.2);transform:scale(0.9)}
.flip-btn svg{width:24px;height:24px;pointer-events:none}

/* scan line */
.scan-line{
  position:fixed;left:0;right:0;height:2px;z-index:15;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  animation:scanMove 2.5s ease-in-out infinite;opacity:0;pointer-events:none;
}
.scan-line.active{opacity:0.7}
@keyframes scanMove{0%{top:15%}50%{top:80%}100%{top:15%}}

/* progress hint */
.progress-hint{
  text-align:center;font-size:13px;color:rgba(255,255,255,0.55);
  margin-bottom:10px;font-weight:500;
}

/* ══════════════════════ STEP 2: SOUND ══════════════════════ */
.s2-wrap{
  flex:1;display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top,16px) + 64px) 16px 0;
}
.sound-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sound-card{
  aspect-ratio:1;border-radius:18px;
  background:rgba(13,17,23,0.85);border:2px solid rgba(255,255,255,0.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;user-select:none;
  transition:border-color .2s,background .2s,transform .1s;
  backdrop-filter:blur(12px);
}
.sound-card:active{transform:scale(0.95)}
.sound-card.playing{border-color:var(--purple);background:rgba(163,113,247,0.18)}
.sound-card.done{border-color:var(--teal);background:rgba(63,185,80,0.15)}
.sound-num{font-size:36px;font-weight:700;color:#fff;line-height:1}
.sound-wave{display:flex;align-items:flex-end;gap:4px;height:28px}
.sound-wave span{display:block;width:5px;border-radius:3px;background:rgba(255,255,255,0.25);height:6px}
.sound-card.playing .sound-wave span{background:var(--purple)}
.sound-card.done .sound-wave span{background:var(--teal)}
.sound-card.playing .sound-wave span:nth-child(1){animation:bar .8s ease-in-out infinite 0s}
.sound-card.playing .sound-wave span:nth-child(2){animation:bar .8s ease-in-out infinite .15s}
.sound-card.playing .sound-wave span:nth-child(3){animation:bar .8s ease-in-out infinite .3s}
.sound-card.playing .sound-wave span:nth-child(4){animation:bar .8s ease-in-out infinite .15s}
.sound-card.playing .sound-wave span:nth-child(5){animation:bar .8s ease-in-out infinite 0s}
@keyframes bar{0%,100%{height:4px}50%{height:24px}}
.sound-result{font-size:13px;font-weight:600;color:var(--teal);min-height:18px;text-align:center}

.guess-sheet{
  border-radius:20px;padding:16px;
  background:rgba(13,17,23,0.92);border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(16px);margin-bottom:12px;
}
.guess-label{font-size:14px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:12px}
.guess-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.guess-btn{
  height:54px;border-radius:12px;
  background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);
  font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:600;color:#fff;
  cursor:pointer;transition:all .15s;
}
.guess-btn:active{background:rgba(255,255,255,0.25);transform:scale(0.96)}

/* ══════════════════════ STEP 3: AR TOUCH ══════════════════════ */
#arVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.55}
#arCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:5;pointer-events:none}
.s3-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 16px calc(env(safe-area-inset-bottom,16px) + 16px);
  position:relative;z-index:10;
}
.touch-progress{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.tp-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);transition:all .3s}
.tp-dot.done{background:var(--teal);border-color:var(--teal)}
.tp-dot.active{background:var(--amber);border-color:var(--amber);transform:scale(1.2)}

.touch-card{
  border-radius:20px;padding:18px;
  background:rgba(13,17,23,0.9);border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(16px);margin-bottom:12px;
}
.touch-card-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.touch-card-q{font-size:16px;color:#fff;line-height:1.6;margin-bottom:14px}
.choices-row{display:flex;flex-wrap:wrap;gap:8px}
.choice-chip{
  padding:10px 18px;border-radius:30px;
  background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.3);
  font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:500;color:#fff;
  cursor:pointer;transition:all .15s;user-select:none;
}
.choice-chip:active{transform:scale(0.93)}
.choice-chip.selected{background:#d97706;border-color:#d97706;color:#fff}

/* ══════════════════════ COMPLETE ══════════════════════ */
.complete-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
  background:rgba(13,17,23,0.92);
}
.complete-orb{
  width:120px;height:120px;border-radius:50%;margin-bottom:24px;
  background:rgba(63,185,80,0.2);border:2px solid rgba(63,185,80,0.5);
  display:flex;align-items:center;justify-content:center;font-size:56px;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(63,185,80,0.3)}50%{transform:scale(1.04);box-shadow:0 0 0 16px rgba(63,185,80,0)}}
.complete-title{font-family:'DM Serif Display',serif;font-size:32px;color:#fff;margin-bottom:10px}
.complete-sub{font-size:15px;color:rgba(255,255,255,0.6);line-height:1.8;margin-bottom:28px}
.complete-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.complete-tag{font-size:13px;padding:6px 16px;border-radius:20px;background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.4);color:var(--teal);font-weight:500}
</style>
</head>
<body>

<!-- FULLSCREEN CAMERA BACKGROUND (Step 1) -->
<div id="camLayer">
  <video id="camVideo" autoplay playsinline muted></video>
</div>
<div class="scan-line" id="scanLine"></div>

<!-- FLIP BUTTON -->
<div class="flip-btn" id="flipBtn" onclick="flipCamera()">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 7h-9"/><path d="M14 17H5"/>
    <polyline points="17 4 20 7 17 10"/><polyline points="8 14 5 17 8 20"/>
  </svg>
</div>

<!-- ═══════════════ STEP 1 ═══════════════ -->
<div id="s1" class="screen active">
  <!-- TOP HUD -->
  <div class="hud">
    <div class="hud-badge">Step 1 · 視覺</div>
    <div class="hud-title">找出 5 樣看得見的東西</div>
    <div class="pip-row">
      <div class="pip active"></div><div class="pip"></div><div class="pip"></div>
    </div>
  </div>

  <!-- BOTTOM DRAWER -->
  <div class="drawer" id="drawer">

    <!-- HANDLE — always visible, tap to open/close -->
    <div class="drawer-handle-area" onclick="toggleDrawer()">
      <div class="drawer-handle"></div>
      <div class="drawer-peek">
        <span class="drawer-progress-text" id="hint1">已找到 0 / 5 樣 — 點此展開清單</span>
        <span class="drawer-chevron">⌃</span>
      </div>
    </div>

    <!-- ALWAYS-VISIBLE BUTTONS -->
    <div style="padding:0 12px 8px;display:flex;flex-direction:column;gap:8px" id="drawerBtns">
      <button class="btn btn-white" id="camBtn" onclick="startCamera()">開啟鏡頭開始偵測</button>
      <button class="btn btn-outline" id="snapBtn" onclick="snapAndDetect()" style="display:none">拍照 — 讓 AI 辨識</button>
      <button class="btn btn-success" id="btn1next" onclick="goS2()" style="display:none">找到全部了！繼續 →</button>
    </div>

    <!-- COLLAPSIBLE BODY -->
    <div class="drawer-body">
      <div class="status-bar" id="camStatus" style="margin:8px 0">點擊上方按鈕開啟鏡頭</div>
      <div class="drawer-items">
        <div class="item-row" id="ir-backpack" onclick="manualMark('backpack')">
          <div class="item-circle" id="ic-backpack">✓</div>
          <span class="item-label">書包</span>
          <span class="item-tag" id="it-backpack"></span>
        </div>
        <div class="item-row" id="ir-pen" onclick="manualMark('pen')">
          <div class="item-circle" id="ic-pen">✓</div>
          <span class="item-label">筆</span>
          <span class="item-tag" id="it-pen"></span>
        </div>
        <div class="item-row" id="ir-book" onclick="manualMark('book')">
          <div class="item-circle" id="ic-book">✓</div>
          <span class="item-label">書本</span>
          <span class="item-tag" id="it-book"></span>
        </div>
        <div class="item-row" id="ir-bottle" onclick="manualMark('bottle')">
          <div class="item-circle" id="ic-bottle">✓</div>
          <span class="item-label">水瓶</span>
          <span class="item-tag" id="it-bottle"></span>
        </div>
        <div class="item-row" id="ir-phone" onclick="manualMark('phone')">
          <div class="item-circle" id="ic-phone">✓</div>
          <span class="item-label">手機 · 平板</span>
          <span class="item-tag" id="it-phone"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════ STEP 2 ═══════════════ -->
<div id="s2" class="screen" style="background:var(--bg)">
  <div class="hud">
    <div class="hud-badge teal">Step 2 · 聽覺</div>
    <div class="hud-title">猜猜這是什麼聲音？</div>
    <div class="pip-row">
      <div class="pip done"></div><div class="pip active"></div><div class="pip"></div>
    </div>
  </div>

  <div class="s2-wrap">
    <div style="height:12px"></div>
    <div class="sound-grid">
      <div class="sound-card" id="sc-0" onclick="playAnon(0)">
        <div class="sound-num">1</div>
        <div class="sound-wave" id="sw-0"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="sound-result" id="sr-0"></div>
      </div>
      <div class="sound-card" id="sc-1" onclick="playAnon(1)">
        <div class="sound-num">2</div>
        <div class="sound-wave" id="sw-1"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="sound-result" id="sr-1"></div>
      </div>
      <div class="sound-card" id="sc-2" onclick="playAnon(2)">
        <div class="sound-num">3</div>
        <div class="sound-wave" id="sw-2"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="sound-result" id="sr-2"></div>
      </div>
      <div class="sound-card" id="sc-3" onclick="playAnon(3)">
        <div class="sound-num">4</div>
        <div class="sound-wave" id="sw-3"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="sound-result" id="sr-3"></div>
      </div>
    </div>

    <div class="guess-sheet" id="guessSheet" style="display:none">
      <div class="guess-label">你覺得這是什麼聲音？</div>
      <div class="guess-grid">
        <button class="guess-btn" onclick="submitGuess('森林')">🌲 森林</button>
        <button class="guess-btn" onclick="submitGuess('海浪')">🌊 海浪</button>
        <button class="guess-btn" onclick="submitGuess('溪流')">🏞 溪流</button>
        <button class="guess-btn" onclick="submitGuess('雨聲')">🌧 雨聲</button>
      </div>
    </div>

    <div class="progress-hint" id="hint2">已猜出 0 / 4 種聲音 — 點數字播放，再選答案</div>
    <div style="flex:1"></div>
    <button class="btn btn-success" id="btn2next" onclick="goS3()" style="display:none;margin-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)">全部猜完！繼續 →</button>
    <div style="height:calc(env(safe-area-inset-bottom,0px) + 16px)"></div>
  </div>
</div>

<!-- ═══════════════ STEP 3 ═══════════════ -->
<div id="s3" class="screen">
  <video id="arVideo" autoplay playsinline muted></video>
  <canvas id="arCanvas"></canvas>

  <div class="hud" style="z-index:20">
    <div class="hud-badge amber">Step 3 · 觸覺</div>
    <div class="hud-title" id="arObjName">手臂皮膚</div>
    <div class="pip-row">
      <div class="pip done"></div><div class="pip done"></div><div class="pip active"></div>
    </div>
  </div>

  <div class="s3-wrap">
    <div class="touch-progress" id="tprog">
      <div class="tp-dot active" id="tp0"></div>
      <div class="tp-dot" id="tp1"></div>
      <div class="tp-dot" id="tp2"></div>
    </div>
    <div class="touch-card">
      <div class="touch-card-label">觸摸提示</div>
      <div class="touch-card-q" id="tqText"></div>
      <div class="choices-row" id="tqChoices"></div>
    </div>
    <div class="progress-hint" id="hint3">已感受 0 / 3 種觸感</div>
    <button class="btn btn-success" id="btn3next" onclick="showComplete()" style="display:none">完成練習 ✓</button>
  </div>
</div>

<!-- ═══════════════ COMPLETE ═══════════════ -->
<div id="sDone" class="screen">
  <div class="complete-wrap">
    <div class="complete-orb">🌿</div>
    <div class="complete-title">你回來了</div>
    <div class="complete-sub">三感已一一確認<br>視覺、聽覺、觸覺都告訴你<br>此刻你是安全的、踏實的</div>
    <div class="complete-tags">
      <span class="complete-tag">✓ 視覺 5 樣</span>
      <span class="complete-tag">✓ 聽覺 4 種</span>
      <span class="complete-tag">✓ 觸覺 3 種</span>
    </div>
    <button class="btn btn-white" style="max-width:280px" onclick="restart()">重新練習</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════ STATE ═══════
let camStream=null,detectCooldown=false,currentFacingMode='environment';
let foundItems={backpack:false,pen:false,book:false,bottle:false,phone:false},foundCount=0;
let anonAudio=null,playingIdx=-1;
let soundGuessed=[false,false,false,false],soundGuessCount=0;
let SOUND_ORDER=[];
let touchIdx=0,touchAnswered=[false,false,false];
let arCamStream=null,arAnimId=null,threeRenderer=null;

const ITEM_KEYS=['backpack','pen','book','bottle','phone'];
const SOUND_URLS={forest:'Forest.mp3',ocean:'Ocean.mp3',river:'river.mp3',rain:'Rain.mp3'};
const SOUND_NAMES={forest:'森林',ocean:'海浪',river:'溪流',rain:'雨聲'};
const TOUCH_ITEMS=[
  {label:'手臂皮膚',  q:'用手背輕輕摸一下自己的手臂皮膚，感覺是？',  choices:['溫暖','涼涼的','粗糙','滑順']},
  {label:'衣服布料',  q:'輕輕搓一下你現在穿的衣服，布料感覺是？',    choices:['粗糙','滑順','有彈性','厚實']},
  {label:'椅子表面',  q:'用手摸摸你坐的椅子表面，材質是？',          choices:['木頭','塑膠','金屬','布料']}
];

function shuffleSounds(){
  const a=['forest','ocean','river','rain'];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  SOUND_ORDER=a;
}
shuffleSounds();

// ═══════ NAVIGATION ═══════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ═══════ DRAWER ═══════
let drawerOpen=false;
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  document.getElementById('drawer').classList.toggle('open',drawerOpen);
}
function openDrawer(){
  drawerOpen=true;
  document.getElementById('drawer').classList.add('open');
}

// ═══════ STEP 1 ═══════
function setStatus(m){
  const el=document.getElementById('camStatus');
  if(el)el.textContent=m;
}

async function startCamera(){
  const btn=document.getElementById('camBtn');
  btn.disabled=true; btn.textContent='開啟鏡頭中…';
  setStatus('請稍候…');
  await openCam(currentFacingMode);
}

async function openCam(facing){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1280}},audio:false
    });
    const vid=document.getElementById('camVideo');
    vid.srcObject=camStream; await vid.play();
    document.getElementById('camBtn').style.display='none';
    document.getElementById('snapBtn').style.display='flex';
    const fl=document.getElementById('flipBtn'); fl.style.display='flex';
    document.getElementById('scanLine').classList.add('active');
    setStatus('鏡頭已開啟 — 對準物品後點「拍照」');
  }catch(e){
    const btn=document.getElementById('camBtn');
    btn.disabled=false; btn.textContent='開啟鏡頭開始偵測';
    setStatus('無法開啟鏡頭，請手動點擊物品確認');
  }
}

async function flipCamera(){
  const fl=document.getElementById('flipBtn');
  fl.style.opacity='0.4';
  currentFacingMode=currentFacingMode==='environment'?'user':'environment';
  setStatus(currentFacingMode==='user'?'切換為前鏡頭…':'切換為後鏡頭…');
  await openCam(currentFacingMode);
  fl.style.opacity='1';
}

function captureFrame(){
  const vid=document.getElementById('camVideo');
  const c=document.createElement('canvas');
  c.width=vid.videoWidth||640; c.height=vid.videoHeight||480;
  c.getContext('2d').drawImage(vid,0,0);
  return c.toDataURL('image/jpeg',0.85).split(',')[1];
}

async function snapAndDetect(){
  if(detectCooldown)return;
  detectCooldown=true;
  const snapBtn=document.getElementById('snapBtn');
  snapBtn.disabled=true; snapBtn.textContent='AI 辨識中…';
  const b64=captureFrame();
  const unfound=ITEM_KEYS.filter(k=>!foundItems[k]);
  const labels={backpack:'書包',pen:'筆',book:'書本',bottle:'水瓶',phone:'手機或平板'};
  const lookingFor=unfound.map(k=>labels[k]).join('、');

  for(let attempt=1;attempt<=3;attempt++){
    setStatus(attempt===1?'AI 分析畫面中…':`重試中（${attempt}/3）…`);
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),12000);
    try{
      const resp=await fetch('/api/detect',{
        method:'POST',signal:ctrl.signal,
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageBase64:b64,itemsToFind:lookingFor})
      });
      clearTimeout(timer);
      if(resp.status===503||resp.status===429){
        if(attempt<3){await sleep(2000);continue;}
        throw new Error('伺服器忙碌');
      }
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error||'錯誤'+resp.status);}
      const data=await resp.json();
      const result=data.result||{};
      let n=0;
      ITEM_KEYS.forEach(k=>{if(!foundItems[k]&&result[k]===true){markFound(k,'AI ✓');n++;}});
      setStatus(n===0?'未偵測到新物品，換個角度再試，或手動點擊':`找到 ${n} 樣！繼續拍其他物品`);
      break;
    }catch(e){
      clearTimeout(timer);
      const msg=e.name==='AbortError'?'AI 回應超時':'偵測失敗：'+e.message;
      if(attempt===3)setStatus(msg+'，請手動點擊物品確認');
      else await sleep(2000);
    }
  }
  snapBtn.disabled=false; snapBtn.textContent='拍照 — 讓 AI 辨識';
  setTimeout(()=>{detectCooldown=false;},1500);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function markFound(key,src){
  if(foundItems[key])return;
  foundItems[key]=true; foundCount++;
  document.getElementById('ir-'+key).classList.add('found');
  document.getElementById('ic-'+key).textContent='✓';
  document.getElementById('it-'+key).textContent=src;
  const hintText = foundCount>=5 ? '✓ 全部找到！' : `已找到 ${foundCount} / 5 樣 — 點此展開清單`;
  document.getElementById('hint1').textContent=hintText;
  // auto-open drawer so student sees the tick
  openDrawer();
  if(foundCount>=5){
    document.getElementById('scanLine').classList.remove('active');
    document.getElementById('snapBtn').style.display='none';
    document.getElementById('btn1next').style.display='flex';
    setStatus('全部找到了！太棒了 🎉');
  }
}
function manualMark(k){if(!foundItems[k])markFound(k,'手動');}

function goS2(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  document.getElementById('camVideo').srcObject=null;
  document.getElementById('flipBtn').style.display='none';
  document.getElementById('scanLine').classList.remove('active');
  showScreen('s2');
}

// ═══════ STEP 2 ═══════
function playAnon(i){
  if(soundGuessed[i])return;
  if(anonAudio){anonAudio.pause();anonAudio=null;}
  document.querySelectorAll('.sound-card').forEach((c,j)=>{if(!soundGuessed[j])c.classList.remove('playing');});
  playingIdx=i;
  document.getElementById('sc-'+i).classList.add('playing');
  try{
    const a=new Audio(SOUND_URLS[SOUND_ORDER[i]]);
    a.loop=true; a.volume=0.8; a.play().catch(()=>{});
    anonAudio=a;
  }catch(e){}
  document.getElementById('guessSheet').style.display='block';
}

function submitGuess(answer){
  if(playingIdx<0)return;
  const i=playingIdx;
  const correct=SOUND_NAMES[SOUND_ORDER[i]];
  const isRight=answer===correct;
  document.getElementById('sc-'+i).classList.remove('playing');
  document.getElementById('sc-'+i).classList.add('done');
  document.getElementById('sr-'+i).textContent=isRight?`✓ ${correct}`:`${answer}→${correct}`;
  if(anonAudio){anonAudio.pause();anonAudio=null;}
  playingIdx=-1; soundGuessed[i]=true; soundGuessCount++;
  document.getElementById('hint2').textContent=`已猜出 ${soundGuessCount} / 4 種聲音`;
  document.getElementById('guessSheet').style.display='none';
  if(soundGuessCount>=4)document.getElementById('btn2next').style.display='flex';
}

function goS3(){
  if(anonAudio){anonAudio.pause();anonAudio=null;}
  showScreen('s3');
  initAR();
}

// ═══════ STEP 3 AR ═══════
async function initAR(){
  touchIdx=0; touchAnswered=[false,false,false];
  renderTouchStep(0);
  try{
    arCamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    const v=document.getElementById('arVideo');
    v.srcObject=arCamStream; await v.play();
  }catch(e){}
  resizeCanvas();
  startThreeJS(0);
}

function resizeCanvas(){
  const c=document.getElementById('arCanvas');
  c.width=window.innerWidth; c.height=window.innerHeight;
}

function renderTouchStep(i){
  const item=TOUCH_ITEMS[i];
  document.getElementById('arObjName').textContent=item.label;
  document.getElementById('tqText').textContent=item.q;
  const ch=document.getElementById('tqChoices'); ch.innerHTML='';
  item.choices.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='choice-chip'; btn.textContent=c;
    btn.onclick=()=>selectChoice(i,btn); ch.appendChild(btn);
  });
  [0,1,2].forEach(j=>{
    const d=document.getElementById('tp'+j);
    d.className='tp-dot'+(j<i?' done':j===i?' active':'');
  });
  document.getElementById('hint3').textContent=`已感受 ${touchAnswered.filter(Boolean).length} / 3 種觸感`;
}

function selectChoice(idx,btn){
  if(touchAnswered[idx])return;
  document.querySelectorAll('.choice-chip').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  touchAnswered[idx]=true;
  document.getElementById('hint3').textContent=`已感受 ${touchAnswered.filter(Boolean).length} / 3 種觸感`;
  setTimeout(()=>{
    if(touchIdx<2){touchIdx++;renderTouchStep(touchIdx);startThreeJS(touchIdx);}
    else document.getElementById('btn3next').style.display='flex';
  },700);
}

function startThreeJS(idx){
  if(arAnimId)cancelAnimationFrame(arAnimId);
  if(threeRenderer){threeRenderer.dispose();threeRenderer=null;}
  const THREE=window.THREE; if(!THREE)return;
  const W=window.innerWidth, H=window.innerHeight;
  const canvas=document.getElementById('arCanvas');
  canvas.width=W; canvas.height=H;

  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(50,W/H,0.1,100);
  cam.position.z=4;
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(W,H); renderer.setClearColor(0,0); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  threeRenderer=renderer;

  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const sun=new THREE.DirectionalLight(0xfff5e0,1.5); sun.position.set(3,5,4); scene.add(sun);
  const fill=new THREE.DirectionalLight(0xaaccff,0.4); fill.position.set(-4,-2,-3); scene.add(fill);

  const group=new THREE.Group(); scene.add(group);

  if(idx===0){
    const skin=new THREE.MeshStandardMaterial({color:0xd4a27a,roughness:0.75,metalness:0.05});
    const dark=new THREE.MeshStandardMaterial({color:0xb8895a,roughness:0.8});
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.30,2.2,32),skin);
    arm.rotation.z=Math.PI/2; group.add(arm);
    group.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.30,32,16),dark),{position:new THREE.Vector3(-1.2,0,0)}));
    group.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.17,0.24,0.45,32),skin),{rotation:new THREE.Euler(0,0,Math.PI/2),position:new THREE.Vector3(1.2,0,0)}));
    group.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.17,32,16),skin),{position:new THREE.Vector3(1.45,0,0)}));
    for(let i=0;i<14;i++){
      const h=new THREE.Mesh(new THREE.CylinderGeometry(0.007,0.003,0.14,4),new THREE.MeshStandardMaterial({color:0x6b4423,roughness:1}));
      const a=Math.random()*Math.PI*2,r=0.23+Math.random()*0.05;
      h.position.set((Math.random()-0.5)*2,r*Math.cos(a),r*Math.sin(a));
      h.rotation.z=Math.PI/2+((Math.random()-0.5)*0.3); group.add(h);
    }
  } else if(idx===1){
    const cloth=new THREE.MeshStandardMaterial({color:0x3d6eb5,roughness:0.95,side:THREE.DoubleSide});
    const dark=new THREE.MeshStandardMaterial({color:0x2d5a9a,roughness:1,side:THREE.DoubleSide});
    group.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(2.0,2.2,0.12),cloth)));
    const lS=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.7,0.1),cloth);
    lS.position.set(-1.3,0.75,0); lS.rotation.z=Math.PI/8; group.add(lS);
    const rS=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.7,0.1),cloth);
    rS.position.set(1.3,0.75,0); rS.rotation.z=-Math.PI/8; group.add(rS);
    const collar=new THREE.Mesh(new THREE.TorusGeometry(0.35,0.065,12,32),dark);
    collar.position.y=1.1; collar.rotation.x=Math.PI/2; group.add(collar);
    [-0.5,0.05,0.6].forEach(y=>{
      const f=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.028,0.015),dark);
      f.position.set(0,y,0.07); group.add(f);
    });
  } else {
    const wood=new THREE.MeshStandardMaterial({color:0x8b5c2a,roughness:0.85,metalness:0.05});
    const dark=new THREE.MeshStandardMaterial({color:0x5a3618,roughness:0.9});
    const seat=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.14,1.6),wood); seat.position.y=-0.15; group.add(seat);
    const back=new THREE.Mesh(new THREE.BoxGeometry(2.0,1.3,0.12),wood); back.position.set(0,0.56,-0.78); group.add(back);
    [-0.1,0.22,0.54].forEach(y=>{const b=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.065,0.065),dark);b.position.set(0,y,-0.78);group.add(b);});
    [[-0.8,0.65],[-0.8,-0.65],[0.8,0.65],[0.8,-0.65]].forEach(([x,z])=>{
      const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.06,1.0,12),dark);
      leg.position.set(x,-0.72,z); group.add(leg);
    });
    [0.65,-0.65].forEach(z=>{const r=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,1.6,8),dark);r.rotation.z=Math.PI/2;r.position.set(0,-0.9,z);group.add(r);});
  }

  // AR ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.3,0.016,8,64),new THREE.MeshBasicMaterial({color:0xe6a817,transparent:true,opacity:0.55}));
  ring.rotation.x=Math.PI/2; scene.add(ring);
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(1.55,0.009,8,64),new THREE.MeshBasicMaterial({color:0xe6a817,transparent:true,opacity:0.25}));
  ring2.rotation.x=Math.PI/2; scene.add(ring2);

  let t=0;
  function animate(){
    arAnimId=requestAnimationFrame(animate);
    t+=0.012;
    group.position.y=Math.sin(t)*0.08;
    group.rotation.y=Math.sin(t*0.4)*0.22;
    ring.rotation.z=t*0.25; ring2.rotation.z=-t*0.18;
    renderer.render(scene,cam);
  }
  animate();
}

function showComplete(){
  if(arAnimId)cancelAnimationFrame(arAnimId);
  if(threeRenderer){threeRenderer.dispose();threeRenderer=null;}
  if(arCamStream){arCamStream.getTracks().forEach(t=>t.stop());arCamStream=null;}
  document.getElementById('arVideo').srcObject=null;
  showScreen('sDone');
}

// ═══════ RESTART ═══════
function restart(){
  // reset state
  foundItems={backpack:false,pen:false,book:false,bottle:false,phone:false}; foundCount=0;
  detectCooldown=false; currentFacingMode='environment';
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  soundGuessed=[false,false,false,false]; soundGuessCount=0; playingIdx=-1;
  if(anonAudio){anonAudio.pause();anonAudio=null;}
  touchIdx=0; touchAnswered=[false,false,false];
  if(arAnimId)cancelAnimationFrame(arAnimId);
  if(threeRenderer){threeRenderer.dispose();threeRenderer=null;}
  if(arCamStream){arCamStream.getTracks().forEach(t=>t.stop());arCamStream=null;}
  shuffleSounds();

  // reset S1 UI
  ITEM_KEYS.forEach(k=>{
    document.getElementById('ir-'+k).classList.remove('found');
    document.getElementById('ic-'+k).textContent='✓';
    document.getElementById('it-'+k).textContent='';
  });
  document.getElementById('hint1').textContent='已找到 0 / 5 樣 — 點此展開清單';
  document.getElementById('camStatus').textContent='點擊上方按鈕開啟鏡頭';
  drawerOpen=false;
  document.getElementById('drawer').classList.remove('open');
  const cb=document.getElementById('camBtn');
  cb.style.display='flex'; cb.disabled=false; cb.textContent='開啟鏡頭開始偵測';
  document.getElementById('snapBtn').style.display='none';
  document.getElementById('snapBtn').textContent='拍照 — 讓 AI 辨識';
  document.getElementById('snapBtn').disabled=false;
  document.getElementById('btn1next').style.display='none';
  document.getElementById('flipBtn').style.display='none';
  document.getElementById('flipBtn').style.opacity='1';
  document.getElementById('scanLine').classList.remove('active');
  document.getElementById('camVideo').srcObject=null;

  // reset S2 UI
  [0,1,2,3].forEach(i=>{
    const c=document.getElementById('sc-'+i);
    c.classList.remove('playing','done');
    document.getElementById('sr-'+i).textContent='';
  });
  document.getElementById('guessSheet').style.display='none';
  document.getElementById('hint2').textContent='已猜出 0 / 4 種聲音 — 點數字播放，再選答案';
  document.getElementById('btn2next').style.display='none';

  // reset S3 UI
  document.getElementById('arVideo').srcObject=null;
  document.getElementById('hint3').textContent='已感受 0 / 3 種觸感';
  document.getElementById('btn3next').style.display='none';
  const ac=document.getElementById('arCanvas');
  ac.width=0; ac.height=0;

  showScreen('s1');
}
</script>
</body>
</html>
